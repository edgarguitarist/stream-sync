<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YT Dual Sync</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header id="bar" class="bar">
      <h1>YT Dual Sync</h1>
      <textarea id="urls" class="urls" rows="2"
        placeholder="Una URL de YouTube por línea (la primera es la REFERENCIA de audio). Mínimo 2; admite 3, 4, …"></textarea>
      <label class="pos">pos <input id="pos" type="number" value="600" min="0" /> s</label>
      <button id="sync" class="primary">Sincronizar</button>
    </header>

    <div id="status" class="status">Pega 2 o más URLs de YouTube del mismo evento (un POV por línea) y pulsa Sincronizar.</div>

    <main id="stage" class="stage" hidden></main>

    <div id="toolbar">
      <button id="resync" title="Recalcular el desfase (timer + audio) en la posición actual">♺ re-sync</button>
      <button id="fs" title="Pantalla completa">⛶</button>
    </div>

    <footer id="controls" class="controls" hidden>
      <button id="playpause" class="primary">▶ Reproducir</button>
      <input id="seek" class="seek" type="range" min="0" max="100" value="0" step="0.1" />
      <span id="time" class="time">0:00 / 0:00</span>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
